name: AppImage

# Build (and smoke-test) the AppImage on every push to main, so a broken build
# recipe is caught immediately — not only when a release is tagged. The same
# recipe (build/build_appimage.sh) is used here, in release.yml, and locally,
# so there is exactly one build to maintain.
#
# Also runnable on demand (workflow_dispatch) on ANY branch: that uploads a
# downloadable AppImage artifact, which is how you test a feature branch that
# doesn't have a published release yet. See docs/appimage-testing.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Match release.yml: an older glibc keeps the bundled manylinux CPython
    # broadly compatible across the target distros.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build "python-appimage>=1.4,<2"

      - name: Build the AppImage
        env:
          # FUSE isn't available on GitHub runners; build/appimagetool honour
          # this and extract-and-run instead of mounting.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Authenticated API access avoids 403s on python-appimage's CPython
          # base-image download.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build/build_appimage.sh

      - name: Smoke-test the built AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x platterpus-x86_64.AppImage
          ./platterpus-x86_64.AppImage --version

      - name: Upload the AppImage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: platterpus-x86_64.AppImage
          path: platterpus-x86_64.AppImage
          if-no-files-found: error
