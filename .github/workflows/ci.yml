name: CI

# Run the test suite on every push to main and every pull request, so
# regressions are caught before they land. This is the same `pytest` that
# passes locally — the suite needs no CD hardware (whipper/MusicBrainz/Qt are
# all faked or run headless).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow a manual run on any branch. Needed because pushes/PRs made with a
  # GitHub App token (e.g. from a cloud session) do NOT auto-trigger `push`/
  # `pull_request` workflows — GitHub's recursion guard — so without this the
  # suite can't be run on such a branch at all. `workflow_dispatch` IS honoured
  # for App tokens (same path release.yml uses), so this is the escape hatch.
  workflow_dispatch:

# Least privilege: every job here only READS the repo (lint / test / changelog /
# media-guard). The default GITHUB_TOKEN is broad (contents: write, etc.), so pin
# it down — a compromised action pulled into CI then can't push, tag, or open
# PRs. The release/publish workflows declare their own (wider) permissions where
# they actually need them.
permissions:
  contents: read

jobs:
  # Lint + format check. Fast and dependency-light (ruff is a single binary,
  # no Qt libs needed), so it runs as its own job in parallel with the tests.
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install "ruff>=0.15,<1"

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Format check (ruff format --check)
        run: ruff format --check src tests

  # Static type-checking (added 2026-07-08). Strict def-typing is enforced
  # across the whole package (no per-module exclusions since 2026-07-19/20 —
  # see pyproject [tool.mypy]). Catches wrong attributes, bad return types, and
  # None-where-a-value-is-required. It needs the PySide6 wheel installed for its
  # bundled type stubs, but NOT the Qt SYSTEM libraries the `test` job installs —
  # mypy reads `.pyi` stubs and never imports Qt, so there's no apt step.
  typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev extras (mypy + PySide6 stubs)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type-check (mypy)
        run: mypy

  # Mechanical backstop for CLAUDE.md Critical Rule #7 ("Documentation currency
  # is part of Done"): fail a push/PR that lands with no CHANGELOG.md entry. The
  # real behaviour-changer is the always-loaded rule itself; this just catches a
  # slip. A pure historical-record commit (e.g. a docs/session-log catch-up that
  # legitimately has nothing user-facing to log) opts out with a "[skip changelog]"
  # line of its own in a commit message (or the marker in the PR title). Fast and
  # dependency-light.
  changelog:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # need the range's history to diff + read messages

      - name: Require a CHANGELOG entry (or an explicit opt-out)
        env:
          EVENT: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ACTOR: ${{ github.actor }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          set -euo pipefail
          # A manual run has no "change range" to police (no before/base sha),
          # so the changelog gate is meaningless here — skip it. The real gate
          # still runs on every push-to-main and PR.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual dispatch; no change range to police — skipping CHANGELOG check."
            exit 0
          fi
          # Dependency bumps are exempt: Dependabot can't add a CHANGELOG bullet
          # and the bump PR is itself the record. Detect it on the PR (the actor,
          # or the dependabot/* head branch) AND on the push-to-main merge commit
          # (its author, which a squash merge preserves) so neither surface goes
          # red. A human dep bump that wants an entry can still add one normally.
          case "${HEAD_REF:-}" in
            dependabot/*) is_dependabot=1 ;;
            *) is_dependabot=0 ;;
          esac
          if [ "$ACTOR" = "dependabot[bot]" ] \
              || [ "${HEAD_COMMIT_AUTHOR:-}" = "dependabot[bot]" ] \
              || [ "$is_dependabot" = "1" ]; then
            echo "Dependency bump (Dependabot); no CHANGELOG entry required — skipping."
            exit 0
          fi
          if [ "$EVENT" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"; title="$PR_TITLE"
          else
            base="$PUSH_BEFORE"; head="$GITHUB_SHA"; title=""
          fi
          # No real base to diff against (new ref / all-zero sha) → nothing to check.
          if printf '%s' "$base" | grep -qE '^0+$'; then
            echo "New ref with no base commit; skipping CHANGELOG check."
            exit 0
          fi
          # Opt-out: "[skip changelog]" in the PR title or ANY commit in the range.
          if printf '%s' "$title" | grep -qiF '[skip changelog]'; then
            echo "Opt-out via PR title; skipping."; exit 0
          fi
          # Match the marker only as its own (optionally indented) line, never a
          # prose mention — otherwise a commit that *documents* the marker opts
          # itself out. The marker is a deliberate standalone line.
          if git log --format='%B' "$base..$head" \
              | grep -qiE '^[[:space:]]*\[skip changelog\][[:space:]]*$'; then
            echo "Opt-out via commit message; skipping."; exit 0
          fi
          # The check: was CHANGELOG.md touched anywhere in the range?
          if git diff --name-only "$base" "$head" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated. ✅"
          else
            echo "::error::No CHANGELOG.md entry for this change. Add a bullet to the [Unreleased] section in the same commit (CLAUDE.md Critical Rule #7), or put a '[skip changelog]' line of its own in the commit message for a pure historical-record commit."
            exit 1
          fi

  # Server-side backstop for CLAUDE.md Critical Rule #8 (never commit audio /
  # copyrighted media). `.githooks/pre-commit` is the client-side guard, but a
  # contributor without the hook installed — or a `git commit --no-verify` — could
  # still push audio to this PUBLIC repo. This makes the SERVER the authoritative
  # guard: fail any push/PR that introduces a file with an audio extension.
  media-guard:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # need the range's history to diff
      - name: Reject audio/copyrighted media (Critical Rule #8)
        env:
          EVENT: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Same audio-extension pattern as .githooks/pre-commit + .gitignore.
          pattern='\.(flac|wav|mp3|m4a|aac|ogg|oga|opus|wv|ape|wma|aiff|aif|alac|dsf|dff)$'
          if [ "$EVENT" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          else
            base="$PUSH_BEFORE"; head="$GITHUB_SHA"
          fi
          # Manual run or a new ref with no base → scan the whole tree instead of a range.
          if [ "$EVENT" = "workflow_dispatch" ] || printf '%s' "$base" | grep -qE '^0+$'; then
            offenders=$(git ls-files | grep -iE "$pattern" || true)
          else
            offenders=$(git diff --name-only --diff-filter=ACMR "$base" "$head" | grep -iE "$pattern" || true)
          fi
          if [ -n "$offenders" ]; then
            echo "::error::Audio/copyrighted media must never be committed (CLAUDE.md Critical Rule #8). Offenders:"
            printf '%s\n' "$offenders" >&2
            exit 1
          fi
          echo "No audio/media files. ✅"

  # Dependency-vulnerability audit (2026-07-08 trust audit). Installs the project
  # and runs pip-audit against the resolved dependency graph — including the
  # self-declared-unmaintained musicbrainzngs. Gating: a new advisory turns CI
  # red so it can't slip in unnoticed. Escape hatch for an advisory with no fix
  # yet: append `--ignore-vuln <GHSA/PYSEC-id>` here with a reason + revisit date.
  pip-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project + pip-audit
        run: |
          # Upgrade setuptools alongside pip: it's a build-time tool the runner
          # ships (not a shipped runtime dep of the wheel), and a fresh advisory
          # (PYSEC-2026-3447) flags the runner's older setuptools. Pulling the
          # latest patched setuptools keeps the audit honest without suppressing
          # a real finding — the actual fix, not an --ignore-vuln.
          python -m pip install --upgrade pip setuptools
          python -m pip install -e . pip-audit
      - name: Audit dependencies
        run: pip-audit --progress-spinner=off

  # Advisory (never fails): warn when src/ changes without a matching tests/
  # change — a soft nudge toward "every change carries a test / every bug gets a
  # regression test", mirroring the changelog gate's range logic. It only emits a
  # GitHub ::warning:: and always exits 0, because plenty of legitimate src edits
  # (a comment, a rename, a docstring) need no new test.
  tests-touched:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Warn if src changed without tests
        env:
          EVENT: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          else
            base="$PUSH_BEFORE"; head="$GITHUB_SHA"
          fi
          if [ "$EVENT" = "workflow_dispatch" ] || printf '%s' "$base" | grep -qE '^0+$'; then
            echo "No change range to check."; exit 0
          fi
          changed=$(git diff --name-only "$base" "$head")
          src=$(printf '%s\n' "$changed" | grep -E '^src/platterpus/.*\.py$' || true)
          tst=$(printf '%s\n' "$changed" | grep -E '^tests/.*\.py$' || true)
          if [ -n "$src" ] && [ -z "$tst" ]; then
            echo "::warning::src/ changed but no tests/ change in this range. If this is a behaviour change, add or adjust a test (CLAUDE.md: every bug gets a regression test)."
          else
            echo "src/tests change balance OK. ✅"
          fi

  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Test across the Python versions our users actually run. We've been
        # bitten by version-specific breakage before (whipper's pkg_resources
        # use vs Python 3.14); a matrix catches the GUI side of that class of
        # problem early. 3.11 is the floor (pyproject `requires-python`); 3.14
        # (2025-10) is the newest — added 2026-07-02 (nothing the project uses
        # was removed in it; PySide6 6.11 supports it).
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    name: test (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history + tags: the doc-stamp guard
          # (tests/test_doc_version_stamps.py) diffs against the latest release
          # tag; on the default shallow clone it would silently skip.
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PySide6 imports a handful of system libraries even under the
      # "offscreen" Qt platform (no display needed). Install the minimal set;
      # without these the QApplication fixture in conftest.py fails to load.
      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Run with branch coverage and a hard floor. The gate ratchets up as
      # the suite grows — raise --cov-fail-under when TOTAL comfortably clears
      # it; never lower it to make a red build pass.
      #
      # A single clean pass. The offscreen-Qt/PySide *process abort* that used to
      # flake this matrix (SIGSEGV/SIGABRT) was a wrong-thread QObject destruction
      # in the pending-installs dialog — fixed at the root (see the 2026-07 entry
      # in docs/testing.md), so the retry-on-abort wrapper that masked it is gone.
      # `timeout-minutes` is a cheap backstop: if a future regression hangs the
      # suite, the job fails in minutes instead of burning the 6-hour default.
      - name: Run tests (with coverage gate)
        env:
          QT_QPA_PLATFORM: offscreen
        timeout-minutes: 15
        run: >-
          pytest -q
          --cov=platterpus
          --cov-report=term-missing
          --cov-fail-under=91
