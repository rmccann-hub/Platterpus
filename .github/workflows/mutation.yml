name: Mutation testing (weekly)

# Non-blocking test-EFFICACY signal (2026-07-08 trust audit). Coverage says which
# lines ran; mutation testing says whether the tests would actually CATCH a bug.
# mutmut mutates the highest-stakes pure logic — the external-output parsers, the
# AccurateRip verdict, and the CTDB CRC — and reports "survivors" (mutations no
# test killed). Scheduled + manual only: it NEVER runs on a PR and NEVER gates a
# merge (that's what docs/testing.md calls it — a periodic audit, not a CI gate).
# Read the run summary; a wall of survivors means the suite is weaker than the
# coverage number suggests. Everything is `|| true` + time-bounded so a slow or
# imperfect run is harmless.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-22.04
    timeout-minutes: 90  # hard bound — this is a signal, not a blocker
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      # The test suite drives PySide6, so the headless Qt system libs are needed
      # (same set as the CI `test` job).
      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install project + mutmut
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" mutmut

      - name: Run mutmut on the trust-bearing modules
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mutmut run --paths-to-mutate \
            "src/platterpus/parsers/,src/platterpus/verdict.py,src/platterpus/ctdb/crc.py" \
            || true
          echo "===== mutmut results (survivors are what to look at) ====="
          mutmut results || true
